tag-prefix: ''
next-version: '2.1.0'

branches:
  main:
    regex: ^master$|^main$
    increment: Patch
    label: preview
    # Untagged commits on main produce `<base>-preview.<commits>` so manual previews
    # from main (via workflow_dispatch) are clearly labeled. A real version tag bypasses
    # this — release-package.yml fires on tag push and uses the tag string directly.
    mode: ContinuousDelivery
  develop:
    regex: ^dev(elop)?(ment)?$
    increment: Minor
    label: preview
  release:
    regex: ^releases?[/-]
    increment: None
    label: beta
  feature:
    regex: ^features?[/-]
    increment: Inherit
    label: preview
    # ContinuousDelivery so each commit on a feature branch ticks the prerelease number
    # (`2.1.0-preview.1` -> `.2` -> `.3`...). Without this, every preview build from the
    # same branch lands on `<base>-preview.1` and NuGet rejects the duplicate version.
    mode: ContinuousDelivery
  hotfix:
    regex: ^hotfix(es)?[/-]
    increment: Patch
    label: beta