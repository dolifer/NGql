name: Publish pre-release NuGet packages

on:
  # Auto-publish when library or tool source changes land on main. Documentation,
  # workflow tweaks, and skill content don't trigger here — they'd just push
  # duplicate `--skip-duplicate` no-ops to NuGet, which is wasted CI minutes and noise.
  push:
    branches: [main]
    paths:
      - 'src/Core/**'
      - 'tools/Tool/**'
      - 'GitVersion.yml'
      - 'Directory.Build.props'
      - '.github/workflows/pre-release-package.yml'
  # Manual trigger stays for re-runs, testing the publish flow, or shipping a release
  # that touches none of the paths above (e.g. a CHANGELOG-only fix).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          # workflow_dispatch checks out a detached HEAD by default, which causes GitVersion
          # to fall back to the literal label "--no-branch-" (yielding versions like
          # `2.0.1--no-branch-.10`). Pass the originating ref so we land on a real branch.
          ref: ${{ github.ref }}
      - name: Install .NET SDKs (8, 9, 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Pack and publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: make publish
