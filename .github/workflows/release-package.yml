name: Publish NuGet packages from tag

on:
  push:
    # Ignore skill release tags — those go through release-skill.yml and don't ship NuGet.
    # `tags-ignore` alone (without `tags`) means "all tags except these patterns."
    tags-ignore:
      - 'skill-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install .NET SDKs (8, 9, 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Pack and publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: make publish
