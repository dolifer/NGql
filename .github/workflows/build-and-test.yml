name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install .NET SDKs (8, 9, 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Build, test, and generate coverage report
        run: make ci
      - name: Upload Coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: artifacts/coverage-report
      # Build the Jekyll site (landing + install + skill pages) and merge the coverage
      # report under /coverage/ so a single Pages artifact carries both. The Jekyll source
      # lives at the repo root (_config.yml, index.md, install.md, skill.md); coverage
      # comes from artifacts/coverage-report/ produced by `make ci` above.
      - name: Build Pages site (Jekyll + coverage)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Merge coverage report into _site/coverage/
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        # `actions/jekyll-build-pages` runs Jekyll in a Docker container and writes _site/
        # owned by root. The runner user can't mkdir/cp inside it without sudo. Take ownership
        # back first so the cp (and any later steps) work as the unprivileged runner.
        run: |
          sudo chown -R "$USER:$USER" _site
          mkdir -p _site/coverage
          cp -R artifacts/coverage-report/. _site/coverage/
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
