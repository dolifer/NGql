name: Build & Test

on:
  push:
    branches:
      - main
      - feature/fix_type_drift_bug
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install net8.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install net9.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install net10.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore NGql.sln
      - name: Build
        run: dotnet build NGql.sln --configuration Release --no-restore
      - name: Test with coverage
        run: |
          dotnet test NGql.sln \
            --configuration Release \
            --no-build \
            --results-directory ${{ github.workspace }}/artifacts/test-results \
            --logger "junit;LogFilePath=${{ github.workspace }}/artifacts/test-results/junit/{assembly}.xml;MethodFormat=Class;FailureBodyFormat=Verbose" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=${{ github.workspace }}/artifacts/test-results/coverlet/ \
            /p:ExcludeByFile=\"*.Generated.cs\"
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - name: Generate coverage report
        run: |
          reportgenerator \
            "-reports:artifacts/test-results/coverlet/*.cobertura.xml" \
            "-targetdir:artifacts/coverage-report" \
            "-reporttypes:HtmlInline_AzurePipelines;Badges"
      - name: Upload Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage-report
      - name: Publish coverage report to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/coverage-report
          publish_branch: gh-pages
          force_orphan: true
